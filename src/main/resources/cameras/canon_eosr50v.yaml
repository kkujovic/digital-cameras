ReviewData:
    ExecutiveSummary: 'Manufacturer description: The EOS R50 V is an interchangable lens mirrorless camera with a 24MP APS-C sensor. It''s aimed at video creators with the ability to shoot at 4K at 60fps and support for advanced video tools such as the C-Log3 color mode and false color monitoring.'
