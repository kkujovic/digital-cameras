ReviewData:
    ExecutiveSummary: 'The Panasonic S1RII is the company''s high-resolution camera, with a 44MP BSI CMOS sensor. It can shoot up to 10 fps with its mechanical shutter and 40 fps in E-shutter mode. It can shoot up to 8.1K video.'
