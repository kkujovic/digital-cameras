ReviewData:
    ExecutiveSummary: 'The Ricoh GR IV HDF is a variant of the GR IV premium compact. It adds a highlight diffusion filter in the place of the standard model''s switchable ND filter, letting you give a soft, diffuse look to your photos when you want. The 26MP APS-C sensor and 28mm-equivalent F2.8 lens remain unchanged.'
