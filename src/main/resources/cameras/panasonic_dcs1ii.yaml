ReviewData:
    ExecutiveSummary: 'The Panasonic Lumix DC-S1II is a 24MP full-frame camera with a ''partially stacked'' sensor. It''s aimed at stills and video shooters, with its ability to shoot Raw stills at up to 70fps and to record full-width 4K/60, 4K/120 with a slight crop and 6K open gate footage.'
