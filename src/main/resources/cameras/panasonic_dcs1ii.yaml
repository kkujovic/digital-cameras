    ReviewSummary:
        GoodFor: |-
            True hybrid shooters
            Photographers doing landscapes and action
            Dedicated videographers
        NotSoGoodFor: |-
            Professional sports shooters
            Stills-only shooters
        Conclusion: 'The S1II is extremely capable for both stills and video. It''s the most expensive in its class, but may offer enough features to justify the cost.'
