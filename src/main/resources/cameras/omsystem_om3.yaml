ReviewData:
    ExecutiveSummary: 'The OM-3 is a Four Thirds camera from OM System with retro styling. It features a 20MP Stacked sensor, capable of shooting at up to 50fps with continuous autofocus and 120fps with single autofocus. The OM-3 features a "Creative Dial" taken straight from the PEN-F, which lets you quickly switch between color modes, including a monochrome setting.'
