        - /files/p/products/omsystem_om3/shots/7e6e6e2465714208a486b91da39a3e5e.png
    ReviewSummary:
        GoodFor: Travelers who may encounter anything
        NotSoGoodFor: Shooters that need maximum image quality
        Conclusion: 'The OM-3 is a camera that''s small enough to go anywhere, with enough speed and computational tricks to capture almost any subject you''ll come across.'
