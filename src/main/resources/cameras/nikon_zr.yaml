ReviewData:
    ExecutiveSummary: 'The Nikon ZR is the company''s first camera to wear the Red branding alongside the manufacturer''s name. It''s a full-frame video camera built around the same sensor as the Z6III, making it capable of 6K/60 video in either N-Raw or the Red-derived R3D NE Raw format. It also adds internal 32-bit float audio capture and shutter angle to Nikon-developed subject-recognition autofocus and in-body image stabilization.'
