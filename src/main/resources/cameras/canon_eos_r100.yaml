    ReviewSummary:
        GoodFor: Photographers on a tight budget.
        NotSoGoodFor: Those who want capable 4K video capture, better performance, and a touchscreen.
        Conclusion: 'The compact Canon EOS R100 does a fine job at its most important tasks: taking good quality photos and having a long-lasting battery. However, a lot of corners were cut to reach its bargain price, so it''s not a great choice for videographers, action photographers, or anyone who prefers a touchscreen. Unless money is tight, we recommend spending a little more for a more capable camera.'
