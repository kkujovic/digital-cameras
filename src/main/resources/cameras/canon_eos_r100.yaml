    ExecutiveSummary: 'Manufacturer description: The Canon EOS R100 camera is an entry level 24MP APC-C mirrorless hybrid camera for the RF-mount system.'
    ProductPhotos:
        - /files/p/products/canon_eos_r100/shots/208362404cab4b1e925b08629519e1a3.png
