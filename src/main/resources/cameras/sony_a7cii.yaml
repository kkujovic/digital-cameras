ReviewData:
    ExecutiveSummary: 'TheSony a7C IIis the brand''s second-generation compact rangefinder-style full-frame camera. Similar in design to Its predecessor, the a7C II uses the same fantastic 33MP BSI sensor from the largerSony a7 IVand boasts impressive still, video and autofocus capabilities that should appeal to a wide range of users.'
