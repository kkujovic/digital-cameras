ReviewData:
    ExecutiveSummary: 'The Fujifilm X-E5 is the latest mid-range rangefinder-style mirrorless camera to join the X-series. It takes several steps back towards the enthusiast-friendly outlook of the original X-E models and gains image stabilization along the way.'
