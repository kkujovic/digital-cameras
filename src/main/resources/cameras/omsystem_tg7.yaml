ReviewData:
    ExecutiveSummary: 'Manufacturer description: The OM System Tough TG-7 rugged camera is designed to deliver exceptional performance, with dustproof and shockproof capabilities, enduring falls from up to 2.1 meters and resisting forces up to one hundred kilograms. The Tough TG-7’s underwater shooting modes complement its waterproof abilities up to fifteen meters, and it remains functional in freezing temperatures down to -10°C. The camera can be utilized with the PT-059 Underwater Housing (sold separately) for usability in depths of up to forty-five meters. Its Field Sensor System automatically acquires location and environmental data, enhancing the shooting experience. The TG-7 features a compact, lightweight, and durable design, embodying the essence of the OM SYSTEM brand.'
