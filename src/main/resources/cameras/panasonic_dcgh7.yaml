    ReviewSummary:
        GoodFor: Serious videographers who need support for a video-centric workflow.
        NotSoGoodFor: Users who primarily want to shoot still photos rather than video.
        Conclusion: 'The Panasonic GH7 is a Micro Four Thirds camera with a strong focus on shooting video, and is an evolutionary upgrade from its predecessor, the GH6. The addition of phase-detect autofocus makes it more usable for run-and-gun video, and it gains 32-bit float audio recording and improved dynamic range as well. Although it''s a hybrid camera with deep feature sets for both stills and video, it''s really video where it excels.'
