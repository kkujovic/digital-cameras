ReviewData:
    ExecutiveSummary: 'The Panasonic Lumix DC-S1IIE is a 24MP, full-frame camera featuring a BSI CMOS sensor. It features similar capabilities to the S5IIX, but houses them in a refined body that also includes some workflow upgrades, such as support for Capture One tethering, and the ability to keep the shutter closed when changing lenses.'
