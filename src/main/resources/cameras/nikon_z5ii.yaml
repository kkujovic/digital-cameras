        - /files/p/products/nikon_z5ii/shots/c9da5d905d5a45bc9180526e8156b0ad.png
        - /files/p/products/nikon_z5ii/shots/6e3f44a9c18a462aa712a5d656618863.png
    ReviewSummary:
        GoodFor: A remarkably broad range of photographers and videographers.
        NotSoGoodFor: Photographers looking for a compact kit for travel. Anyone with the most demanding AF requirements.
        Conclusion: 'The Nikon Z5II combines a well-regarded sensor, with a broad range of features for both stills and video shooters. It''s a fairly sizeable camera, especially once you include lenses, but the provision of in-body stabilization and Nikon''s latest AF systems make it a hugely accomplished all-rounder.'
