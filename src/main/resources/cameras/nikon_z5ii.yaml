ReviewData:
    ExecutiveSummary: 'The Nikon Z5II is the company''s entry-level, full-frame mirrorless camera. It''s built around a 24MP BSI CMOS sensor, which is stabilized up to 7.5EV. It can shoot at up to 14fps with its mechanical shutter and up to 30fps JPEG only using a 12-bit readout, and its autofocus system can recognize nine types of subject.'
