    ReviewSummary:
        GoodFor: |-
            Shooting video for social media
            Experimenting with different colors
            Occasional picture taking for social media
        NotSoGoodFor: |-
            Photo hobbyists or enthusiasts
            Ultra-compact kits
        Conclusion: 'The S9 is a capable video camera for creators who want the look and image quality of a full-frame camera. Its ergonomics and lack of photography essentials like an EVF and mechanical shutter don''t make it ideal for stills, but we''re impressed by the well-thought-out video-to-phone-to-social-media workflow.'
