    ReviewSummary:
        GoodFor: |-
            Those who want a more flexible compact camera
            Fans of Fujifilm's old medium format film cameras with out-there aspect ratios
        NotSoGoodFor: Night and indoor-shooting enthusiasts
        Conclusion: 'The GFX100RF offers incredible image quality in a relatively compact package – in the right conditions.'
