ReviewData:
    ExecutiveSummary: 'The GFX100RF is a large-sensor compact camera, featuring an unstabilized 102MP medium format CMOS sensor and a 35mm (28mm equiv.) F4 lens. It has physical controls for shutter speed, ISO, aperture and exposure compensation, as well as two top-plate command dials.'
