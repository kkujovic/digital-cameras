ReviewData:
    ExecutiveSummary: 'The Sony DSC-RX1R III is the company''s fourth full-frame compact camera with the same Zeiss-branded 35mm F2 lens. The latest version uses a 60.2MP sensor and Sony''s latest processors.'
    ProductPhotos:
        - /files/p/products/sony_dscrx1riii/shots/969f72af34b34cc0b0618bf279243f44.png
        - /files/p/products/sony_dscrx1riii/shots/3d46ec8824c8426da18d51ad62e68ec0.png
        - /files/p/products/sony_dscrx1riii/shots/13490fcbd94d49d6aecb73772c045360.png
        - /files/p/products/sony_dscrx1riii/shots/4c1f11211eeb45009d42173e994aafd6.png
        - /files/p/products/sony_dscrx1riii/shots/cee2cb339fd3475491b333151c595837.png
    ReviewSummary:
        GoodFor: X100 users who want even more. Photographers for whom size and portability are paramount.
        NotSoGoodFor: Anyone needing flexibility. Photographers shooting lots of video.
        Conclusion: 'The RX1R III is the smallest full-frame camera on the market. It features a 35mm F2 lens that can be a touch soft at wide apertures but delivers the full resolution when stopped down. Its autofocus is best in class, in terms of speed and dependability. It''s an expensive camera and there are cheaper models with more features, but it''s hard to think of a photographers'' compact that takes better images so readily.'
