ReviewData:
    ExecutiveSummary: 'The Fujifilm X-S20 is a DSLR-style mirrorless camera with a 26MP X-Trans BSI-CMOS sensor. Unlike other Fujifilm X-series cameras, it has a more traditional control layout and a larger grip. It uses the same sensor as the X-T4 and X-S20 with upgrades to the image stabilization system, processor, and AF system. The camera can shoot bursts at 30 fps with a crop, 20 fps without using the electronic shutter, or 8 fps with the mechanical shutter and can sustain bursts longer thanks to its UHS-II card slot and faster processor.'
    ProductPhotos:
        - /files/p/products/fujifilm_xs20/shots/441bbe211b0146ed87a755e86520ec11.png
        - /files/p/products/fujifilm_xs20/shots/a7eadc430022405895a470e1985ffe7f.jpeg
        - /files/p/products/fujifilm_xs20/shots/6f262a5f8e0e41efa25bc4674eeefddd.jpeg
    ReviewSummary:
        GoodFor: New content creators shooting stills and video
        NotSoGoodFor: High-speed action or wildlife photography
        Conclusion: 'The X-S20 is a surprisingly capable APS-C camera, giving you 2020 flagship-level performance for a reasonable price. It lacks the autofocus performance of its competitors, but it makes up for that by cramming in a ton of features for videos and photos alike, giving content creators room to experiment and grow. It shoots charming, high-quality images, solid 4K video and arguably has more character than its competitors.'
