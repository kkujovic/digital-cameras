    ReviewSummary:
        GoodFor: Sports, wildlife, photojournalism, landscapes...
        NotSoGoodFor: Travel photography where size and weight are critical.
        Conclusion: 'The Z8 brings the speed and autofocus capability of the Z9 to a smaller, more affordable body to deliver a camera that will support you in almost any photographic pursuit. It''s a touch larger than its rivals but every facet of its abilities seems to be a match for those peers. It''s perhaps the most complete camera we''ve yet tested.'
