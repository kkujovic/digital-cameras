ReviewData:
    ExecutiveSummary: 'Canon''s EOS R5 II is a high-end, full-frame mirrorless camera, built around a Stacked CMOS sensor and many of the autofocus features of the company''s new flagship EOS R1 model.'
    ProductPhotos:
        - /files/p/products/canon_eosr5ii/shots/25da09fce3e84467849ea1cc71bb59b2.png
        - /files/p/products/canon_eosr5ii/shots/b6280ea57e5242fbb3f68208406fd1c3.png
        - /files/p/products/canon_eosr5ii/shots/e86da0dbbcca493fad30574a7dabba12.png
        - /files/p/products/canon_eosr5ii/shots/430fb900fe8043d79a45b4eda09d888b.png
        - /files/p/products/canon_eosr5ii/shots/d4aff6199ad546c996300dfdd4a37484.png
    ReviewSummary:
        GoodFor: A wide range of photography, from landscape to sports, short-clip videography
        NotSoGoodFor: Lightweight travel shooting, recording extended performances
        Conclusion: 'The EOS R5 II, to varying degrees, improves over its predecessor in almost every respect: it''s faster, smarter and a little bit more capable. It''s all-round strength comes at a very slight cost in terms of base ISO dynamic range, and it can''t compete with the endurance of a dedicated video camera, but it''s hard to imagine what photo or video need it won''t support you in.'
