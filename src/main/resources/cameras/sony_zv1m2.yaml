ReviewData:
    ExecutiveSummary: 'The Sony ZV-1 Mark II is a vlogging compact built around a 20MP Type 1 (13.2 x 8.8mm) Stacked CMOS sensor and an 18-50mm equivalent F1.8-4.0 lens.'
    ProductPhotos:
        - /files/p/products/sony_zv1m2/shots/399506a4bb1e42acbdb4c0e42f27f790.png
        - /files/p/products/sony_zv1m2/shots/c555889849c6491489516fa714a5d9a1.png
        - /files/p/products/sony_zv1m2/shots/107ec998232f439e97a7f5541d2c2e08.png
        - /files/p/products/sony_zv1m2/shots/2da1b4db6ecb45f4a15b5ed0144f1c7f.png
    ReviewSummary:
        GoodFor: Video creators seeking a feature-packed dedicated device without a large learning curve.
        NotSoGoodFor: Video creators desiring manual controls and still photographers seeking a pocketable compact.
        Conclusion: 'The video-centric Sony ZV-1 Mark II has excellent rolling shutter, industry-leading autofocus and a very nice selfie-friendly zoom lens, but runs into issues with short battery life and flat out-of-camera audio. The camera thrives in auto modes, making it best suited for users seeking a simple-to-use camera.'
