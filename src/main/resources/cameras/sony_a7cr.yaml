    ReviewSummary:
        GoodFor: 'Those wanting the highest level of Raw detail from a full-frame camera in a small package. Landscape and adventure photographers. Studio photographers working tethered.'
        NotSoGoodFor: 'Those who appreciate a decently large, high-resolution EVF. Filmmakers requiring the best 4K video performance.'
        Conclusion: 'The Sony a7CR features the same best-in-class high-resolution full-frame image quality and industry-leading autofocus performance as the gold award-winning a7R V in a smaller, lighter, more affordable package. The EVF could be better and an AF joystick would be nice, but build quality and battery life impress, making this a great choice for landscape and outdoor adventure shooters.'
