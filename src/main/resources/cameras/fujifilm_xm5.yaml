ReviewData:
    ExecutiveSummary: 'The Fujifilm X-M5 is an entry-level X-mount camera built around the company''s 26MP X-Trans CMOS sensor. It features Fujifilm''s latest AI-powered subject detection modes, an articulating screen and a dedicated vlogging mode. The camera has a microphone, headphone, and USB-C port, as well as MicroHDMI.'
