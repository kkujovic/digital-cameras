ReviewData:
    ExecutiveSummary: 'The Leica Q3 43 is a version of the compact full-frame Q3 with a 43mm F2 lens in place of the 28mm F1.7 on the original.'
    ProductPhotos:
        - /files/p/products/leica_q343/shots/cbbf9049b9e34075ad0d8e4c934821bc.png
        - /files/p/products/leica_q343/shots/f488eed0ba534cc8afa93611c9b52d6d.png
    ReviewSummary:
        GoodFor: People looking to document their life with the highest image quality
        NotSoGoodFor: Cost-conscious photographers, anyone looking for a pragmatic tool to get a job done.
        Conclusion: 'The Leica Q3 43 provides a ''normal'' alternative to the company''s wide-angle fixed lens, full-frame compact. Its image quality is superb, thanks to an excellent lens, and its user interface is pleasantly photography focused. Its video modes and autofocus interface don''t live up to these immensely high standards, but neither gets in the way of the camera''s core mission.'
