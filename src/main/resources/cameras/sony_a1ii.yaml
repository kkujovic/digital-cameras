ReviewData:
    ExecutiveSummary: 'The a1 II is Sony''s flagship camera, combining a 50MP sensor with the ability to shoot at up to 30fps in lossy compressed Raw, and up to 20fps with lossless Raw. It features the company''s latest autofocus technology, and is Sony''s first Alpha camera with automatic subject detection.'
