    ReviewSummary:
        GoodFor: 'Full frame beginners, who don''t want a big heavy camera. Occasional vloggers, and videographers who don''t need to roll footage for long periods. Canon RF users looking for a second body with great image quality.'
        NotSoGoodFor: 'High-speed sports shooting. Those hoping for a wide array of affordable lenses. Wilderness types who venture away from power outlets for days on end.'
        Conclusion: 'An affordable camera that can punch above its weight in stills and 4K video. While its poor battery life keeps it from being a slam-dunk recommendation, you get a lot of camera for your money in the EOS R8. Its simple control scheme is great for beginners, and feature-packed for more advanced users, and its flip-out LCD makes it flexible for off-angle shooting and vlogging.'
