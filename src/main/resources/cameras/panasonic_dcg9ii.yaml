ReviewData:
    ExecutiveSummary: 'Manufacturer description: The Lumix G9 II is the first camera in the Micro Four Thirds Lumix G Series to feature PDAF technology. In line with the growing need to produce highly creative artwork and photography using diverse methods, this new model creates high-resolution, high-quality images and rich colors straight out of camera. Furthermore, with a new auto-focus technology that combines Panasonic’s accumulated expertise in recognition technology with PDAF, and a high-speed burst shooting mode that ensures decisive moments are always captured, this new model boasts significantly improved power and high-speed performance. The camera supports photographers from various fields using a system that can be combined with the compact and lightweight LUMIX G Micro Four Thirds lenses for ultimate flexibility.'
