    ReviewSummary:
        GoodFor: 'Wildlife and landscape photographers who want a portable camera system. Amateur videographers who don''t need a GH6'
        NotSoGoodFor: Sports photographers. Those who want to shoot for a day on one or two batteries.
        Conclusion: 'The DC-G9 II offers image quality and autofocus improvements over the GH6 yet offers much of that camera''s video spec and its amazing stabilization. We were disappointed with battery life but other than that it''s a worthy Micro Four Thirds stills flagship.'
