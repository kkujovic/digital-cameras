ReviewData:
    ExecutiveSummary: 'The EOS R1 is Canon''s flagship mirrorless camera and is the first EOS body to receive the coveted 1-series moniker since the EOS-1D X Mark III in 2020, which is in line with Canon''s regular release cadence for the EOS-1 series for the past decade. As with most other 1-series models, its features and specifications are aimed at sports photographers and photojournalists who need the highest-performing, most rugged camera available.'
