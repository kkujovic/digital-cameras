ReviewData:
    ExecutiveSummary: 'The PowerShot ELPH 360HS A is an update to Canon''s compact camera with a 20.2MP Type 1/2.3 sensor and a 4.5-54mm (25-300mm equiv.) lens. It features the same Digic 4+ processor and ability to capture 1080p video at 30p, but trades the full-size SD card slot for a microSD one.'
