ReviewData:
    ExecutiveSummary: 'The Ricoh GR IV is a compact camera featuring a 26MP APS-C sensor and a 28mm equiv. F2.8 lens. Its sensor has five-axis stabilization; up from 3-axis on the GR III. The lens is made of 7 elements in 5 groups, with three aspherical elements.'
