ReviewData:
    ExecutiveSummary: 'The Nikon Coolpix P1100 superzoom camera has, as of February 2025, the world''s longest lens in a bridge camera, coming in at 24-3000mm equivalent with a maximum aperture range of F2.8 - F8. The lens features one Super ED and five ED elements and an image stabilization system that reduces shake by up to five stops. With the lens extended, the camera is 181mm (7.2") long and weighs 1.4kg (3.1lbs).'
