ReviewData:
    ExecutiveSummary: 'Nikon''s Zfis a full-frame mirrorless camera with classic styling, built around a 24MP BSI CMOS sensor. It''s designed to mimic the look of the company''s FM2 SLR from the early 1980s, meaning it effectively becomes a full-frame counterpart tothe company''s Z fc APS-C camera.'
