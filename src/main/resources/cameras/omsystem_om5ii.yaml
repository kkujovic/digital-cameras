ReviewData:
    ExecutiveSummary: 'The OM-5 II is an entry-level mirrorless camera from OM System. It features a 20MP Four Thirds CMOS sensor, which is stabilized up to 7.5EV when paired with Sync IS lenses. Compared to its predecessor, it gains a USB-C port for charging and OM System''s latest menu design.'
