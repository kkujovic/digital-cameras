        GoodFor: |-
            Travelers who need a small kit
            Outdoor enthusiasts
            IBIS fans
        NotSoGoodFor: |-
            Sports and action shooters
            Videographers
        Conclusion: 'The OM-5 II still offers some of the most features at its price point, but doesn''t nail the basics as well as its competitors.'
