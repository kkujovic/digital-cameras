ReviewData:
    ExecutiveSummary: 'The Pentax K-3 Mark III Monochrome is a black-and-white only version of the company''s mid-sized enthusiast DSLR. It features a 25.7MP BSI-CMOS sensor, in-body image stabilization, and an all-new optical viewfinder. The viewfinder offers a large 0.7x (equivalent) magnification and has composition and shooting data on a transparent panel. The camera has a fixed 3.2" touchscreen with 1.62 million dots.'
