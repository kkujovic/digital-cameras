        - /files/p/products/hasselblad_x2dii100c/shots/36332f3d831e47c184be5d1f0804413d.png
        - /files/p/products/hasselblad_x2dii100c/shots/d0a3edb258a6476c856e2ca47f117641.png
        - /files/p/products/hasselblad_x2dii100c/shots/60b5e2a84155466ca3f06d49d9909cf2.png
    ReviewSummary:
        GoodFor: A wide range of professional photography.
        NotSoGoodFor: Sports and action. Travel photography.
        Conclusion: 'The Hasselblad X2D II 100C produces sensational image quality but what makes it really compelling are its improved stabilization and autofocus that make the camera much easier to use than before. It''s the first camera to provide a high brightness screen to let you preview the HDR images it can take. I can be a little slow and battery life isn''t great but it can deliver some of the best image quality we''ve ever seen, with the ease of a point-and-shoot.'
