ReviewData:
    ExecutiveSummary: 'The Hasselblad X2D II 100C is a medium format camera built around a 100MP BSI CMOS sensor. Hasselblad claims it''s the first medium format camera to support "true end-to-end high dynamic range," and it records images as 10-bit HEIFs by default. It also supports Ultra HDR JPEGs with a brightness map for backwards compatibility.'
