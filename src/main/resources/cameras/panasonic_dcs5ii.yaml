    ReviewSummary:
        GoodFor: High-quality photos and video production
        NotSoGoodFor: Applications that demand the most cutting-edge AF system, like sports
        Conclusion: 'The Panasonic S5II is a capable full-frame mid-range camera with the right balance capabilities to serve those who want to shoot both photos and video. It offers outstanding image quality with pleasing colors, the best toolset in its class to support video shooters. The AF system is competitive, though it''s not quite as good as the best cameras in its class. It''s an excellent all-around camera and is a great option for those who need to do a bit of everything.'
