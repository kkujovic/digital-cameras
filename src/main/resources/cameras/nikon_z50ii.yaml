    ReviewSummary:
        GoodFor: A wide range of photo and video pursuits
        NotSoGoodFor: Being the 'everything camera' you build a system around.
        Conclusion: 'The Nikon Z50II is a very competent all-rounder for both stills and video. Its limited battery life dents its otherwise strong performance for video but overall it''s an enjoyable camera to shoot with.'
