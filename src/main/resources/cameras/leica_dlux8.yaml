ReviewData:
    ExecutiveSummary: 'The Leica D-Lux 8 is an updated 17MP enthusiast zoom compact camera that uses a series of crops of a Four Thirds sized sensor to give multiple aspect ratios. It''s a gentle update of the D-Lux 7 with refreshed look, revised interface and a much-improved viewfinder.'
    ProductPhotos:
        - /files/p/products/leica_dlux8/shots/7802fc40f67046b58c31e31b056f3f20.png
        - /files/p/products/leica_dlux8/shots/7bcd58929aa74da5ae86283a0e97bd75.png
        - /files/p/products/leica_dlux8/shots/133776345c1847119e4a360f2b57a958.png
    ReviewSummary:
        GoodFor: Photographers wanting a flexible compact.
        NotSoGoodFor: Budget-conscious shooters who need true pocketability.
        Conclusion: 'The D-Lux 8 puts a lot of image quality and flexibility in a small, attractive package. The slow-zooming lens undermines the shooting experience and the image quality doesn''t quite live up to the price tag. We admire the D-Lux 8 more than we love it.'
