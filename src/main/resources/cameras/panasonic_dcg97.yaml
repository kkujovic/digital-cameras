ReviewData:
    ExecutiveSummary: 'The Panasonic G97 is a Micro Four Thirds mirrorless camera with a 20MP CMOS sensor. Like other Panasonic mirrorless models, it has built-in Dual IS 2, that combines in-body and in-lens stabilization to reduce shake by up  to five stops. The G97 also uses the company''s Depth-from-Defocus contrast-detect AF system. The G97 is capable of shooting at 9 fps with focus and exposure locked on the first shot, or 6 fps with continuous AF.'
